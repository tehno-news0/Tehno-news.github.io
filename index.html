<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tehno News — Главная</title>

    <!-- Код подтверждения для Яндекс Вебмастера -->
    <meta name="yandex-verification" content="d7a8c08cc847c459" />

    <style>
      /* Базовые настройки */
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { 
        font-family: Arial, sans-serif; 
        margin: 0; 
        padding: 0;
        background-color: #f4f4f4;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      /* Основной контент */
      .page-wrapper {
        width: 100%;
        /* Фон страницы */
        background-image: url('https://images.unsplash.com/photo-1542359374-6ba6124bf90b?ixlib=rb-1.2.1&auto=format&fit=crop&w=1920&q=80');
        background-size: cover; 
        background-position: center;
        filter: brightness(0.4); 
        display: flex; 
        flex-direction: column; 
        align-items: center;
        padding-top: 80px;
        padding-bottom: 50px;
        flex: 1; /* Чтобы футер был внизу, если контента мало */
      }

      h1 {
        color: #fff; 
        text-shadow: 0 2px 6px rgba(0,0,0,0.7);
        font-size: 3rem;
        margin-bottom: 10px;
        text-align: center;
      }

      p.subtitle {
        color: #ddd; 
        margin-top: 10px;
        font-size: 1.2rem;
        text-align: center;
      }

      .buttons-container { 
        display: flex; 
        gap: 20px; 
        margin-top: 40px; 
        flex-wrap: wrap;
        justify-content: center;
      }

      .nav-btn {
        padding: 15px 30px; 
        font-size: 1rem; 
        cursor: pointer; 
        text-decoration: none;
        border: none;
        background: rgba(255, 255, 255, 0.9); 
        color: #333; 
        border-radius: 6px;
        font-weight: bold;
        transition: background 0.3s, transform 0.2s;
        display: inline-block;
      }

      .nav-btn:hover { 
        background: #fff; 
        transform: scale(1.05);
        box-shadow: 0 4px 10px rgba(0,0,0,0.3);
      }

      footer {
        text-align: center;
        padding: 20px;
        color: #777;
        font-size: 0.9rem;
        width: 100%;
        background-color: #333;
        color: #aaa;
      }
    </style>
  </head>
  <body>

    <!-- Основной блок сайта (без экрана загрузки) -->
    <div class="page-wrapper" id="page">
      <h1>Tehno News</h1>
      <p class="subtitle">Свежие технологические новости, аналитика, финансы</p>

      <div class="buttons-container">
        <a href="news.html" class="nav-btn">Новости</a>
        <a href="market.html" class="nav-btn">Рынок валют и акции</a>
        <a href="business-help.html" class="nav-btn">Помощь бизнесу</a>
      </div>
    </div>

    <footer>
      &copy; 2026 Tehno News. Все права защищены.
    </footer>

  </body>
</html>
