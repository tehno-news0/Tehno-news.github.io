<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tehno News — Главная</title>

    <style>
      /* --- БАЗОВЫЕ НАСТРОЙКИ --- */
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background-color: #0f1115;
        background-image: url('https://images.unsplash.com/photo-1519681393784-d120267933ba?q=80&w=2070&auto=format&fit=crop');
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
        color: #fff;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      /* --- ПРИВЕТСТВЕННЫЙ ЭКРАН --- */
      .overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: #000; z-index: 9999;
        display: flex; justify-content: center; align-items: center;
        transition: opacity 1s ease-out;
      }
      .welcome-text {
        color: #fff; font-size: 3rem; text-align: center;
        transform: translateY(40px); opacity: 0;
        transition: transform 1.2s cubic-bezier(0.25, 1, 0.5, 1), opacity 1.2s ease-out;
      }

      /* --- ОСНОВНОЙ КОНТЕЙНЕР --- */
      .container {
        width: 100%;
        max-width: 800px; /* Чуть уже для удобства чтения на телефоне */
        margin: 0 auto;
        padding: 40px 20px;
        flex: 1;
      }

      h1 {
        text-align: center;
        margin-bottom: 40px;
        text-shadow: 0 2px 6px rgba(0,0,0,0.7);
        font-size: 2.2rem;
        color: #cfa32a;
      }

      /* --- ЛЕНТА НОВОСТЕЙ (ВЕРТИКАЛЬНАЯ) --- */
      .news-feed {
        display: flex;
        flex-direction: column;
        gap: 30px;
        margin-bottom: 50px;
      }

      .news-card {
        background: rgba(0, 0, 0, 0.85);
        border-radius: 12px;
        padding: 25px;
        border: 1px solid rgba(255,255,255,0.1);
        backdrop-filter: blur(10px);
        box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        transition: transform 0.3s, box-shadow 0.3s;
      }
      .news-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 10px 25px rgba(0,0,0,0.5);
      }

      .news-card h3 {
        margin-bottom: 15px;
        color: #cfa32a;
        font-size: 1.4rem;
      }
      .news-card p {
        color: #ddd;
        line-height: 1.6;
        margin-bottom: 20px;
      }

      /* --- КНОПКА "ЧИТАТЬ ДАЛЬШЕ" ВНУТРИ КАРТОЧКИ --- */
      .btn-read-more-card {
        display: block;
        width: 100%;
        padding: 14px;
        background: #cfa32a;
        color: #222;
        text-decoration: none;
        border-radius: 6px;
        font-weight: bold;
        text-align: center;
        transition: background 0.3s;
      }
      .btn-read-more-card:hover {
        background: #e6b833;
      }

      /* --- ДВЕ КНОПКИ ВНИЗУ ЛЕНТЫ --- */
      .bottom-actions {
        display: flex;
        flex-direction: column;
        gap: 15px;
        align-items: center;
        margin-top: 40px;
      }

      .btn-big {
        display: block;
        width: 100%;
        max-width: 400px;
        padding: 18px;
        background: transparent;
        border: 2px solid #cfa32a;
        color: #fff;
        text-decoration: none;
        border-radius: 8px;
        font-size: 1.1rem;
        font-weight: bold;
        text-align: center;
        transition: all 0.3s;
        cursor: pointer;
      }
      .btn-big:hover {
        background: #cfa32a;
        color: #222;
        transform: scale(1.02);
      }

      /* --- ПАНЕЛЬ ДОБАВЛЕНИЯ (СКРЫТАЯ ПО УМОЛЧАНИЮ ИЛИ ВНИЗУ) --- */
      .admin-panel {
        background: rgba(0, 0, 0, 0.9);
        padding: 20px;
        border-radius: 12px;
        margin-top: 40px;
        border: 1px solid rgba(255,255,255,0.1);
        display: none; /* Скрыта по умолчанию, чтобы не мешала */
      }
      .admin-panel h2 {
        margin-bottom: 15px;
        color: #cfa32a;
        font-size: 1.1rem;
        display: none; /* Скрываем заголовок "Админ панель" */
      }
      .admin-input-group {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .admin-input-group input,
      .admin-input-group textarea {
        width: 100%;
        padding: 12px;
        border-radius: 6px;
        border: 1px solid #555;
        background: rgba(255,255,255,0.9);
        color: #333;
        font-size: 1rem;
      }
      .admin-input-group button {
        padding: 12px;
        background: #cfa32a;
        border: none;
        border-radius: 6px;
        color: #222;
        font-weight: bold;
        cursor: pointer;
        margin-top: 10px;
      }

      footer {
        text-align: center;
        padding: 20px;
        color: #777;
        font-size: 0.9rem;
        margin-top: auto;
      }
    </style>
  </head>
  <body>

    <!-- Приветствие -->
    <div class="overlay" id="overlay">
      <div class="welcome-text" id="welcome">Добро пожаловать на Tehno News</div>
    </div>

    <div class="container">
      <h1>Последние новости и статьи</h1>

      <!-- ЛЕНТА НОВОСТЕЙ -->
      <div class="news-feed" id="newsFeed">
        <!-- Сюда JS добавит карточки -->
      </div>

      <!-- ДВЕ КНОПКИ ВНИЗУ -->
      <div class="bottom-actions">
        <a href="news.html" class="btn-big">Читать больше новостей →</a>
        <a href="tech-news.html" class="btn-big">Читать больше тех-новостей →</a>
      </div>
    </div>

    <!-- Панель добавления (скрыта, чтобы не портить вид ленты) -->
    <div class="admin-panel" id="adminPanel">
      <h2>Добавить новость</h2>
      <div class="admin-input-group">
        <input type="text" id="newsTitle" placeholder="Заголовок новости" />
        <textarea id="newsText" rows="3" placeholder="Короткий анонс"></textarea>
        <button id="addNewsBtn">Опубликовать</button>
      </div>
    </div>

    <footer>
      &copy; 2026 Tehno News. Все права защищены.
    </footer>

    <script>
      // 1. Анимация приветствия
      setTimeout(() => {
        const welcome = document.getElementById('welcome');
        const overlay = document.getElementById('overlay');
        welcome.style.transform = 'translateY(0)';
        welcome.style.opacity = '1';
        setTimeout(() => {
          overlay.style.opacity = '0';
          setTimeout(() => { overlay.style.display = 'none'; }, 1000);
        }, 2000);
      }, 500);

      // 2. Элементы
      const feed = document.getElementById('newsFeed');
      const titleInput = document.getElementById('newsTitle');
      const textInput = document.getElementById('newsText');
      const addBtn = document.getElementById('addNewsBtn');
      const adminPanel = document.getElementById('adminPanel');

      // 3. Отрисовка ленты
      function renderNews() {
        const items = JSON.parse(localStorage.getItem('tehnoNews') || '[]');
        feed.innerHTML = '';

        if (items.length === 0) {
            feed.innerHTML = '<p style="text-align:center; color:#888;">Пока нет новостей. Добавьте первую!</p>';
            return;
        }

        // Новые сверху
        items.reverse().forEach(item => {
          const card = document.createElement('div');
          card.className = 'news-card';
          card.innerHTML = `
            <h3>\${escapeHtml(item.title)}</h3>
            <p>\${escapeHtml(item.text)}</p>
            <a href="news.html" class="btn-read-more-card">Читать дальше →</a>
          `;
          feed.appendChild(card);
        });
      }

      // 4. Добавление новости
      addBtn.addEventListener('click', () => {
        const title = titleInput.value.trim();
        const text = textInput.value.trim();
        
        if (!title || !text) {
          return alert('Заполните оба поля!');
        }

        const items = JSON.parse(localStorage.getItem('tehnoNews') || '[]');
        const now = new Date();
        const dateStr = now.toLocaleString('ru-RU', {
          day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit'
        });

        items.push({ title, text, date: dateStr });
        localStorage.setItem('tehnoNews', JSON.stringify(items));

        titleInput.value = '';
        textInput.value = '';
        renderNews();
      });

      // 5. Защита от XSS
      function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
      }

      // Запуск
      renderNews();

      // --- ХИТРОСТЬ ДЛЯ АДМИНИСТРАТОРА ---
      // Чтобы ты мог добавлять новости, но панель не висела на виду у всех,
      // мы сделаем так: при нажатии на футер (или можно добавить маленькую кнопку где-то)
      // панель появится. Но для простоты сейчас я оставлю её скрытой.
      // Если ты единственный пользователь сайта, можешь в CSS найти строку:
      // .admin-panel { display: none; } и поменять на display: block;
      
      // Для теста: если хочешь видеть панель прямо сейчас, раскомментируй строку ниже:
      // adminPanel.style.display = 'block'; 
    </script>
  </body>
</html>
